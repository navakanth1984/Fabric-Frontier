name: ACDLC Verification CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main, dev ]

jobs:
  verify:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.11", "3.13"]

    steps:
    - name: Checkout Repository Code
      uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v5
      with:
        python-version: ${{ matrix.python-version }}
        cache: 'pip'
        cache-dependency-path: '**/requirements.txt'
        # Optional fallback if requirements.txt is empty or missing
        
    - name: Install Hardened Dependencies
      run: |
        python -m pip install --upgrade pip
        # Add basic dependencies here if required by simulations
        # Since ACDLC core is zero-dependency, we only need to assert python standard library
        
    - name: Validate Python Syntax & Style (Linting)
      run: |
        # Assert clean compiling python files
        python -m py_compile $(find . -name "*.py" -not -path "*/.*")
        
    - name: Run Golden Path Induction Walkthrough
      run: |
        python examples/secure_agent_runtime/run_golden_path.py
        
    - name: Run Chaos Simulation 006 (Snapshot Hydration & Version Locking)
      run: |
        python simulations/chaos/chaos_006_snapshot_hydration.py
        
    - name: Validate Replay Verification Tooling
      run: |
        # Generate the Golden Path sample package and run the CLI verify script
        python -m scripts.verify_replay --help || true
