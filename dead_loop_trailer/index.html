<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DEAD LOOP - Premium Cinematic Build</title>
    <link rel="stylesheet" href="timeline.css">
</head>
<body>
    <div class="hyperframes-studio">
        <!-- GLOBAL VFX LAYERS (Visual DNA) -->
        <div class="vfx-layer film-grain"></div>
        <div class="vfx-layer crt-overlay"></div>
        <div class="vfx-layer vignette"></div>

        <!-- CINEMATIC LETTERBOX -->
        <div class="letterbox top"></div>
        <div class="letterbox bottom"></div>

        <!-- MASTER TIMELINE -->
        <div class="timeline-container" id="master-timeline">
            <!-- Scenes will be dynamically generated or hardcoded for deterministic render -->
        </div>
        
        <!-- PLAYBACK CONTROLS -->
        <div class="controls">
            <button id="play-btn">INITIATE FINAL BUILD</button>
        </div>
    </div>

    <audio id="bg-audio" loop>
        <source src="audio_output/bgm.mp3" type="audio/mpeg">
    </audio>

    <script>
        const SHOT_LIST = [
            // BEAT 1: THE CONFLICT
            { id: "01", src: "placeholder_shot_01.jpg", voice: "arjun", text: "నెన్ నిన్ను... ఎట్ల నమ్మాలె?!", audio: "audio_output/01_arjun_trust.wav", motion: "parallax-zoom-in" },
            { id: "02", src: "placeholder_shot_02.jpg", voice: "veda", text: "నా తప్పులున్నయ్. నేను ఇంకా... నేర్చుకుంటనే ఉన్న.", audio: "audio_output/02_veda_learning.wav", motion: "parallax-pan-left" },
            { id: "03", src: "placeholder_shot_03.jpg", voice: "arjun", text: "ప్రాణాలు పోతుంటే... నువ్వెట్ల నేర్చుకుంటవ్?!", audio: "audio_output/03_arjun_lives_lost.wav", motion: "parallax-zoom-out" },
            
            // BEAT 2: THE DISCOVERY
            { id: "04", src: "placeholder_shot_04.jpg", duration: 3000, motion: "parallax-zoom-in" },
            { id: "05", src: "placeholder_shot_05.jpg", duration: 2000, motion: "parallax-pan-left" },
            { id: "06", src: "placeholder_shot_06.jpg", duration: 2000, motion: "parallax-zoom-out" },
            { id: "07", src: "placeholder_shot_07.jpg", voice: "veda", text: "నేను నిన్ను కాపాడాలనుకుంటున్న. నిన్ను ఖచ్చితంగా... కాపాడుతా.", audio: "audio_output/04_veda_protect.wav", motion: "parallax-zoom-in" },
            { id: "08", src: "placeholder_shot_08.jpg", voice: "arjun", text: "నన్నెట్ల కాపాడుతవ్?! ...నిన్ను నువ్వే కాపాడుకోలేనప్పుడు?!", audio: "audio_output/05_arjun_protect_yourself.wav", motion: "parallax-zoom-out" },
            { id: "09", src: "placeholder_shot_09.jpg", voice: "veda", text: "నన్ను నేను కాపాడుకోలేకపోవచ్చు... కానీ నిన్ను మాత్రం—", audio: "audio_output/06_veda_but_i_will.wav", motion: "parallax-pan-left" },
            
            // BEAT 3: THE COST
            { id: "10", src: "placeholder_shot_action.jpg", duration: 2000, motion: "parallax-zoom-in" },
            { id: "11", src: "placeholder_shot_11.jpg", duration: 2500, motion: "parallax-zoom-out" },
            { id: "12", src: "placeholder_shot_03.jpg", duration: 2000, motion: "parallax-pan-left" },

            // BEAT 4: THE VOW
            { id: "13", src: "placeholder_shot_13.jpg", duration: 3000, motion: "parallax-zoom-in" },
            { id: "14", src: "placeholder_shot_04.jpg", duration: 2000, motion: "parallax-zoom-out" },

            // BEAT 5: FRAGILITY
            { id: "17", src: "placeholder_shot_17.jpg", duration: 3000, motion: "parallax-zoom-in" },
            { id: "18", src: "placeholder_shot_18.jpg", duration: 2500, motion: "parallax-zoom-out" },

            // BEAT 6: THE STAND
            { id: "21", src: "placeholder_shot_21.jpg", duration: 4000, motion: "parallax-zoom-in" },
            { id: "25", src: "autoresearch_shot_25/output.jpg", voice: "veda", text: "వాడు... వచ్చేసిండు.", audio: "audio_output/07_veda_he_is_here.wav", motion: "parallax-zoom-out" },
            
            // BEAT 7: FINALITY
            { id: "26", black: true, duration: 3000 },
            { id: "27", src: "autoresearch_shot_27/output.jpg", duration: 3500, motion: "parallax-zoom-in" },
            { id: "28", src: "autoresearch_shot_28/output.jpg", duration: 5000, motion: "parallax-zoom-out" }
        ];

        const timeline = document.getElementById('master-timeline');
        const playBtn = document.getElementById('play-btn');
        const bgAudio = document.getElementById('bg-audio');
        const startTime = Date.now();

        // Build the DOM
        SHOT_LIST.forEach((shot, idx) => {
            const scene = document.createElement('div');
            scene.className = 'scene';
            scene.id = `scene-${shot.id}`;
            if (shot.black) {
                scene.innerHTML = `<div style="background:black; width:100%; height:100%;"></div>`;
            } else {
                scene.innerHTML = `
                    <div class="video-container">
                        <img src="${shot.src}" class="dalle-frame ${shot.motion}">
                    </div>
                    ${shot.text ? `
                        <div class="subtitles">
                            <p class="voice-${shot.voice} glitch-text" data-audio="${shot.audio}">${shot.text}</p>
                        </div>
                    ` : ''}
                `;
            }
            timeline.appendChild(scene);
        });

        const scenes = document.querySelectorAll('.scene');

        playBtn.addEventListener('click', () => {
            playBtn.disabled = true;
            bgAudio.volume = 0;
            bgAudio.play();
            
            // Fade in BGM
            let vol = 0;
            let bgFadeIn = setInterval(() => {
                if (vol < 0.3) { vol += 0.02; bgAudio.volume = vol; }
                else clearInterval(bgFadeIn);
            }, 100);

            console.log(`BGM_START:${Date.now() - startTime}:audio_output/bgm.mp3`);
            playScene(0);
        });

        function playScene(index) {
            if (index >= scenes.length) {
                console.log(`TIMELINE_END:${Date.now() - startTime}`);
                playBtn.disabled = false;
                playBtn.innerText = "REPLAY CINEMATIC";
                return;
            }

            scenes.forEach(s => s.classList.remove('active'));
            const scene = scenes[index];
            const shotData = SHOT_LIST[index];
            scene.classList.add('active');

            if (shotData.audio) {
                console.log(`AUDIO_START:${Date.now() - startTime}:${shotData.audio}`);
                const audio = new Audio(shotData.audio);
                audio.play();
                audio.onended = () => {
                    setTimeout(() => playScene(index + 1), 800); // Cinematic beat
                };
            } else {
                setTimeout(() => playScene(index + 1), shotData.duration || 3000);
            }
        }
    </script>
</body>
</html>
